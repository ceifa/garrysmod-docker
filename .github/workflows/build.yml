name: Docker Image CI

on:
  # Rebuild monthly to pick up Steam/GMod updates; trigger manually to publish
  # source changes. No build on push - that would rebuild multi-GB images on
  # every merge.
  schedule:
    - cron: 0 0 1 * *
  workflow_dispatch:

# Only one build run at a time; a new run cancels an in-progress one.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # These images total tens of GB; reclaim the runner's preinstalled tooling
    # (Android SDK, .NET, GHC, CodeQL...) so the builds don't run out of disk.
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
          /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/local/.ghcup
        sudo docker image prune -af || true
        df -h /

    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # The four debian variants share one Dockerfile; building them in order in the
    # same job lets the root/x64 tags reuse the SteamCMD layers from their siblings
    # (via the buildx builder's local cache). No gha cache - it overflows the 10GB
    # limit, doubles disk via mode=max export, and would serve stale content on the
    # monthly rebuild.
    - name: debian (+ latest)
      uses: docker/build-push-action@v7
      with:
        push: true
        file: Dockerfile
        tags: |
          ceifa/garrysmod:debian
          ceifa/garrysmod:latest

    - name: debian-root
      uses: docker/build-push-action@v7
      with:
        push: true
        file: Dockerfile
        tags: ceifa/garrysmod:debian-root
        build-args: FINAL_USER=root

    - name: debian-x64
      uses: docker/build-push-action@v7
      with:
        push: true
        file: Dockerfile
        tags: ceifa/garrysmod:debian-x64
        build-args: |
          STEAM_BETA=-beta x86-64
          SRCDS_BINARY=srcds_run_x64

    - name: debian-x64-root
      uses: docker/build-push-action@v7
      with:
        push: true
        file: Dockerfile
        tags: ceifa/garrysmod:debian-x64-root
        build-args: |
          STEAM_BETA=-beta x86-64
          SRCDS_BINARY=srcds_run_x64
          FINAL_USER=root

    - name: debian-post
      uses: docker/build-push-action@v7
      with:
        push: true
        file: debian-post.Dockerfile
        tags: ceifa/garrysmod:debian-post

    - name: debian-post-root
      uses: docker/build-push-action@v7
      with:
        push: true
        file: debian-post.Dockerfile
        tags: ceifa/garrysmod:debian-post-root
        build-args: FINAL_USER=root

    # ubuntu shares no layers with the debian images (different base), so reclaim
    # their build cache first to keep peak disk down.
    - name: Reclaim space before ubuntu
      run: docker buildx prune -af && df -h /

    - name: ubuntu
      uses: docker/build-push-action@v7
      with:
        push: true
        file: ubuntu.Dockerfile
        tags: ceifa/garrysmod:ubuntu
